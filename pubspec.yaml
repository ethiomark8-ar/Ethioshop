name: ethioshop
description: Enterprise-grade Ethiopian e-commerce marketplace
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase Infrastructure
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  firebase_messaging: ^16.1.2
  firebase_crashlytics: ^5.0.8
  firebase_performance: ^0.11.1+5

  # State Management
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.21.2

  # Functional Programming
  dartz: ^0.10.1

  # Routing
  go_router: ^15.1.2

  # Local Persistence
  hive_flutter: ^1.1.0
  floor: ^1.4.2

  # UI Components
  cached_network_image: ^3.4.1
  flutter_staggered_grid_view: ^0.7.0
  photo_view: ^0.15.0
  flutter_rating_bar: ^4.0.1
  smooth_page_indicator: ^2.0.1
  shimmer: ^3.0.0

  # Form Management
  #  reactive_forms: ^15.0.0
  intl_phone_number_input: ^0.7.0

  # Media Handling
  image_picker: ^1.1.2
  image_cropper: ^10.0.0+1

  # System Utilities
  intl: ^0.19.0
  connectivity_plus: ^7.0.0
  share_plus: ^12.0.1
  url_launcher: ^6.3.0
  path_provider: ^2.1.4

  # Payment Integration
  webview_flutter: ^4.10.0
  uni_links: ^0.5.1

  # Localization
  flutter_localizations:
    sdk: flutter

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  floor_generator: ^1.4.2

  # Linting
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
    - family: NotoSansEthiopic
      fonts:
        - asset: assets/fonts/NotoSansEthiopic-Regular.ttf
        - asset: assets/fonts/NotoSansEthiopic-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansEthiopic-Bold.ttf
          weight: 700
