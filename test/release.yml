name: EthioShop Release Build

on:
  push:
    tags:
      - 'v*'

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'

jobs:
  build-release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          
      - name: Decode Keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > android/app/keystore.jks
          
      - name: Create key.properties
        if: env.KEYSTORE_PASSWORD != ''
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Build Release APK
        run: |
          flutter build apk --release --build-name=${{ github.ref_name }}
          
      - name: Build App Bundle
        run: |
          flutter build appbundle --release --build-name=${{ github.ref_name }}
          
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/ethioshop-${{ github.ref_name }}.apk
          mv build/app/outputs/bundle/release/app-release.aab build/app/outputs/bundle/release/ethioshop-${{ github.ref_name }}.aab
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ethioshop-${{ github.ref_name }}
          path: |
            build/app/outputs/flutter-apk/ethioshop-${{ github.ref_name }}.apk
            build/app/outputs/bundle/release/ethioshop-${{ github.ref_name }}.aab
          retention-days: 90
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/ethioshop-${{ github.ref_name }}.apk
            build/app/outputs/bundle/release/ethioshop-${{ github.ref_name }}.aab
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Cleanup Keystore
        if: always()
        run: |
          rm -f android/app/keystore.jks
          rm -f android/key.properties